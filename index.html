<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz </title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 28px;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
      font-size: 16px;
      margin-bottom: 15px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: 0.25s;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      color: white;
      margin-top: 10px;
    }

    .btn:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    .btn-danger {
      background: linear-gradient(90deg, #ef4444, #f97316);
    }

    .btn-warning {
      background: linear-gradient(90deg, #facc15, #f97316);
      color: black;
    }

    .question-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .question-title {
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice-btn {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      color: white;
      font-size: 15px;
      transition: 0.2s;
      text-align: left;
    }

    .choice-btn:hover {
      background: rgba(255,255,255,0.10);
    }

    .choice-btn.correct {
      border-color: rgba(34,197,94,0.9);
      background: rgba(34,197,94,0.25);
    }

    .choice-btn.wrong {
      border-color: rgba(239,68,68,0.9);
      background: rgba(239,68,68,0.25);
    }

    .info {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.95;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 15px;
      font-size: 14px;
      opacity: 0.85;
      gap: 10px;
      flex-wrap: wrap;
    }

    .next-btn {
      margin-top: 15px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      display: none;
    }

    .result-box {
      text-align: center;
      padding: 25px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      margin-top: 20px;
    }

    .score {
      font-size: 42px;
      font-weight: 800;
      margin: 15px 0;
      color: #38bdf8;
    }

    .restart-btn {
      margin-top: 15px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
    }

    .hidden {
      display: none;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: rgba(255,255,255,0.12);
    }

    tr:nth-child(even) {
      background: rgba(255,255,255,0.05);
    }

    .rank-title {
      margin-top: 20px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
    }

    .admin-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }

    .admin-box h3 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 16px;
      opacity: 0.9;
    }

    .admin-buttons {
      display: grid;
      gap: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- START SCREEN -->
    <div id="startScreen">
      <h1>Quiz </h1>
      <p>  </p>

      <input type="text" id="usernameInput" placeholder="Masukkan Username..." maxlength="20">

      <button class="btn" onclick="startQuiz()">Start Quiz</button>

      <div class="rank-title">Top Ranking</div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nama</th>
            <th>Skor</th>
            <th>Waktu</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="4">Belum ada data ranking</td></tr>
        </tbody>
      </table>

      <div class="admin-box">
        <h3>(Reset)</h3>
        <div class="admin-buttons">
          <button class="btn btn-danger" onclick="resetRanking()">🗑 Reset Ranking</button>
          <button class="btn btn-warning" onclick="resetSoalTerpakai()">♻ Reset Soal Terpakai</button>
        </div>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quizScreen" class="hidden">
      <div class="top-bar">
        <div>Soal: <span id="qNumber">1</span>/5</div>
        <div>Skor: <span id="scoreNow">0</span></div>
        <div>⏱️ Waktu: <span id="timeNow">0</span>s</div>
      </div>

      <div class="question-box">
        <div class="question-title" id="questionText">Soal tampil di sini</div>
        <div class="choices" id="choicesBox"></div>

        <div class="info hidden" id="feedbackBox"></div>

        <button class="btn next-btn" id="nextBtn" onclick="nextQuestion()">Next ➜</button>
      </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="hidden">
      <div class="result-box">
        <h2>Hasil Quiz</h2>
        <div class="score" id="finalScore">0</div>
        <p id="finalMessage">Pesan akhir</p>
        <p><b>Username:</b> <span id="finalUser"></span></p>
        <p><b>Waktu:</b> <span id="finalTime"></span> detik</p>

        <button class="btn restart-btn" onclick="restartQuiz()">🔁 Peserta Berikutnya</button>
      </div>
    </div>

  </div>

  <script>
    // ==========================
    // BANK SOAL SEJARAH + UMUM + HITUNG CEPAT
    // ==========================
    const questionBank = [
      {
        question: "Indonesia memproklamasikan kemerdekaan pada tanggal ...",
        choices: ["17 Agustus 1945", "1 Juni 1945", "20 Mei 1908", "10 November 1945"],
        answer: "17 Agustus 1945",
        explanation: "Proklamasi kemerdekaan Indonesia terjadi pada 17 Agustus 1945."
      },
      {
        question: "Tokoh yang membacakan teks Proklamasi adalah ...",
        choices: ["Moh. Hatta", "Soekarno", "Sutan Sjahrir", "Jenderal Sudirman"],
        answer: "Soekarno",
        explanation: "Teks Proklamasi dibacakan oleh Ir. Soekarno didampingi Moh. Hatta."
      },
      {
        question: "Kerajaan Hindu tertua di Indonesia adalah ...",
        choices: ["Majapahit", "Kutai", "Sriwijaya", "Mataram Kuno"],
        answer: "Kutai",
        explanation: "Kerajaan Kutai dianggap kerajaan Hindu tertua di Indonesia."
      },
      {
        question: "Kerajaan Sriwijaya terkenal sebagai kerajaan maritim yang berpusat di ...",
        choices: ["Jawa Timur", "Sumatera Selatan", "Kalimantan Barat", "Sulawesi Selatan"],
        answer: "Sumatera Selatan",
        explanation: "Sriwijaya berpusat di Palembang, Sumatera Selatan."
      },
      {
        question: "Peristiwa Sumpah Pemuda terjadi pada tahun ...",
        choices: ["1928", "1945", "1908", "1955"],
        answer: "1928",
        explanation: "Sumpah Pemuda dilaksanakan pada 28 Oktober 1928."
      },
      {
        question: "Isi Sumpah Pemuda yang benar adalah ...",
        choices: ["Satu nusa, satu bangsa, satu bahasa", "Satu negara, satu pemimpin", "Satu agama, satu tujuan", "Satu presiden selamanya"],
        answer: "Satu nusa, satu bangsa, satu bahasa",
        explanation: "Sumpah Pemuda menegaskan persatuan nusa, bangsa, dan bahasa Indonesia."
      },
      {
        question: "Perang Diponegoro terjadi karena ...",
        choices: ["Penolakan pajak Jepang", "Pemasangan patok jalan melewati makam leluhur", "Perebutan kekuasaan antar kerajaan", "Serangan Portugis"],
        answer: "Pemasangan patok jalan melewati makam leluhur",
        explanation: "Perang Diponegoro dipicu pemasangan patok jalan Belanda di tanah makam leluhur Diponegoro."
      },
      {
        question: "Penjajahan Belanda di Indonesia berlangsung sangat lama, yaitu sekitar ...",
        choices: ["100 tahun", "200 tahun", "350 tahun", "50 tahun"],
        answer: "350 tahun",
        explanation: "Secara umum dikenal bahwa Belanda menjajah Indonesia sekitar 350 tahun."
      },
      {
        question: "VOC adalah singkatan dari ...",
        choices: ["Verenigde Oostindische Compagnie", "Volk Onder Controle", "Verenigde Organisasi Center", "Vereeniging Of Colonies"],
        answer: "Verenigde Oostindische Compagnie",
        explanation: "VOC adalah kongsi dagang Belanda bernama Verenigde Oostindische Compagnie."
      },
      {
        question: "Perang besar melawan Portugis di Maluku dipimpin oleh ...",
        choices: ["Sultan Hasanuddin", "Pattimura", "Sultan Agung", "Imam Bonjol"],
        answer: "Pattimura",
        explanation: "Pattimura dikenal memimpin perlawanan rakyat Maluku."
      },
      {
        question: "Kerajaan Majapahit mencapai puncak kejayaan pada masa ...",
        choices: ["Hayam Wuruk", "Ken Arok", "Mulawarman", "Balaputradewa"],
        answer: "Hayam Wuruk",
        explanation: "Majapahit berjaya pada masa Raja Hayam Wuruk dengan Mahapatih Gajah Mada."
      },
      {
        question: "Tokoh yang terkenal dengan Sumpah Palapa adalah ...",
        choices: ["Gajah Mada", "Soekarno", "Pattimura", "Diponegoro"],
        answer: "Gajah Mada",
        explanation: "Gajah Mada bersumpah tidak akan menikmati palapa sebelum Nusantara bersatu."
      },
      {
        question: "Siapakah pahlawan wanita dari Jepara? ",
        choices: ["Kartini", "Cut Nyak Dien", "Dewi Sartika", "Martha Christina"],
        answer: "Kartini",
        explanation: "R.A. Kartini berasal dari Jepara dan dikenal sebagai pelopor emansipasi wanita."
      },
      {
        question: "Jepang mulai menjajah Indonesia pada tahun ...",
        choices: ["1942", "1939", "1945", "1928"],
        answer: "1942",
        explanation: "Jepang masuk dan menjajah Indonesia sejak tahun 1942."
      },
      {
        question: "BPUPKI dibentuk oleh Jepang dengan tujuan ...",
        choices: ["Membentuk tentara baru", "Mempersiapkan kemerdekaan Indonesia", "Membuat kerajaan baru", "Menghapus bahasa Indonesia"],
        answer: "Mempersiapkan kemerdekaan Indonesia",
        explanation: "BPUPKI bertugas menyusun dasar negara dan persiapan kemerdekaan."
      },

      // HITUNG CEPAT (tanpa rumus)
      {
        question: "Hasil dari 125 + 75 adalah ...",
        choices: ["150", "180", "200", "210"],
        answer: "200",
        explanation: "125 + 75 = 200."
      },
      {
        question: "Hasil dari 90 - 37 adalah ...",
        choices: ["53", "57", "47", "63"],
        answer: "53",
        explanation: "90 - 37 = 53."
      },
      {
        question: "Jika 8 × 7 = ...",
        choices: ["54", "56", "58", "60"],
        answer: "56",
        explanation: "8 × 7 = 56."
      },
      {
        question: "Jika kamu punya 50 permen dan memberi 15 permen, sisa permenmu adalah ...",
        choices: ["30", "35", "40", "45"],
        answer: "35",
        explanation: "50 - 15 = 35."
      },
      {
        question: "Hasil dari 144 ÷ 12 adalah ...",
        choices: ["10", "11", "12", "13"],
        answer: "12",
        explanation: "144 ÷ 12 = 12."
      },

      // UMUM
      {
        question: "Ibukota negara Jepang adalah ...",
        choices: ["Osaka", "Tokyo", "Kyoto", "Hiroshima"],
        answer: "Tokyo",
        explanation: "Ibukota Jepang adalah Tokyo."
      },
      {
        question: "Gunung tertinggi di Indonesia adalah ...",
        choices: ["Gunung Merapi", "Gunung Semeru", "Puncak Jaya", "Gunung Rinjani"],
        answer: "Puncak Jaya",
        explanation: "Puncak Jaya (Carstensz Pyramid) adalah yang tertinggi di Indonesia."
      },
      {
        question: "Planet terbesar di tata surya adalah ...",
        choices: ["Mars", "Jupiter", "Saturnus", "Venus"],
        answer: "Jupiter",
        explanation: "Jupiter adalah planet terbesar di tata surya."
      },
      {
        question: "Alat musik tradisional dari Jawa Barat adalah ...",
        choices: ["Angklung", "Kolintang", "Sasando", "Tifa"],
        answer: "Angklung",
        explanation: "Angklung berasal dari Jawa Barat."
      },
      {
        question: "Bendera Indonesia terdiri dari warna ...",
        choices: ["Merah dan putih", "Biru dan putih", "Merah dan kuning", "Hijau dan putih"],
        answer: "Merah dan putih",
        explanation: "Bendera Indonesia berwarna merah dan putih."
      },
      {
        question: "Organ pernapasan utama manusia adalah ...",
        choices: ["Jantung", "Paru-paru", "Ginjal", "Hati"],
        answer: "Paru-paru",
        explanation: "Paru-paru adalah organ utama sistem pernapasan."
      },
      {
        question: "Lambang negara Indonesia adalah ...",
        choices: ["Harimau", "Garuda Pancasila", "Elang Jawa", "Burung Merak"],
        answer: "Garuda Pancasila",
        explanation: "Lambang negara Indonesia adalah Garuda Pancasila."
      },
      {
        question: "Negara yang terkenal dengan Menara Eiffel adalah ...",
        choices: ["Italia", "Inggris", "Prancis", "Jerman"],
        answer: "Prancis",
        explanation: "Menara Eiffel berada di Paris, Prancis."
      },
      {
        question: "Bahasa resmi negara Indonesia adalah ...",
        choices: ["Bahasa Melayu", "Bahasa Indonesia", "Bahasa Jawa", "Bahasa Sunda"],
        answer: "Bahasa Indonesia",
        explanation: "Bahasa resmi Indonesia adalah Bahasa Indonesia."
      },
      {
        question: "Hewan yang dikenal sebagai raja hutan adalah ...",
        choices: ["Harimau", "Singa", "Gajah", "Serigala"],
        answer: "Singa",
        explanation: "Singa sering disebut sebagai raja hutan."
      }
    ];

    // ==========================
    // VARIABEL GAME
    // ==========================
    let selectedQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let username = "";

    let startTime = 0;
    let timerInterval = null;

    // ==========================
    // FILTER USERNAME KASAR
    // ==========================
    const bannedWords = ["kontol", "memek", "anjing", "babi", "ngentot", "tolol", "goblok", "bangsat"];

    function isBadUsername(name) {
      const lower = name.toLowerCase();
      return bannedWords.some(word => lower.includes(word));
    }

    // ==========================
    // LEADERBOARD STORAGE
    // ==========================
    function getLeaderboard() {
      return JSON.parse(localStorage.getItem("quizLeaderboard")) || [];
    }

    function saveLeaderboard(data) {
      localStorage.setItem("quizLeaderboard", JSON.stringify(data));
    }

    function updateLeaderboard(username, score, timeTaken) {
      let leaderboard = getLeaderboard();

      leaderboard.push({
        name: username,
        score: score,
        time: timeTaken
      });

      leaderboard.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.time - b.time;
      });

      leaderboard = leaderboard.slice(0, 10);
      saveLeaderboard(leaderboard);
      renderLeaderboard();
    }

    function renderLeaderboard() {
      const leaderboard = getLeaderboard();
      const body = document.getElementById("leaderboardBody");

      body.innerHTML = "";

      if (leaderboard.length === 0) {
        body.innerHTML = `<tr><td colspan="4">Belum ada data ranking</td></tr>`;
        return;
      }

      leaderboard.forEach((player, index) => {
        body.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${player.name}</td>
            <td>${player.score}</td>
            <td>${player.time}s</td>
          </tr>
        `;
      });
    }

    // ==========================
    // ANTI SOAL BERULANG
    // ==========================
    function getUsedQuestions() {
      return JSON.parse(localStorage.getItem("usedQuestions")) || [];
    }

    function saveUsedQuestions(data) {
      localStorage.setItem("usedQuestions", JSON.stringify(data));
    }

    function getUniqueQuestions(amount) {
      let used = getUsedQuestions();
      let available = questionBank.filter(q => !used.includes(q.question));

      if (available.length < amount) {
        used = [];
        saveUsedQuestions([]);
        available = [...questionBank];
      }

      const picked = shuffle([...available]).slice(0, amount);

      picked.forEach(q => used.push(q.question));
      saveUsedQuestions(used);

      return picked;
    }

    // ==========================
    // RESET ADMIN
    // ==========================
    function resetRanking() {
      const yakin = confirm("Yakin reset ranking? Semua data akan hilang!");
      if (!yakin) return;

      localStorage.removeItem("quizLeaderboard");
      renderLeaderboard();
      alert("Ranking berhasil di-reset!");
    }

    function resetSoalTerpakai() {
      const yakin = confirm("Reset soal terpakai? Semua soal bisa keluar lagi dari awal.");
      if (!yakin) return;

      localStorage.removeItem("usedQuestions");
      alert("Soal terpakai berhasil di-reset!");
    }

    // ==========================
    // START QUIZ
    // ==========================
    function startQuiz() {
      const input = document.getElementById("usernameInput").value.trim();

      if (input.length < 2) {
        alert("Username minimal 2 huruf!");
        return;
      }

      if (isBadUsername(input)) {
        alert("Username tidak sopan. Silakan pakai nama yang baik.");
        return;
      }

      username = input;

      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("quizScreen").classList.remove("hidden");

      selectedQuestions = getUniqueQuestions(5);
      currentIndex = 0;
      score = 0;

      startTime = Date.now();
      startTimer();

      loadQuestion();
    }

    // ==========================
    // TIMER
    // ==========================
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById("timeNow").innerText = elapsed;
      }, 500);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    // ==========================
    // LOAD QUESTION
    // ==========================
    function loadQuestion() {
      answered = false;

      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("feedbackBox").classList.add("hidden");
      document.getElementById("feedbackBox").innerHTML = "";

      document.getElementById("qNumber").innerText = currentIndex + 1;
      document.getElementById("scoreNow").innerText = score;

      const qData = selectedQuestions[currentIndex];

      document.getElementById("questionText").innerText = qData.question;

      const choicesBox = document.getElementById("choicesBox");
      choicesBox.innerHTML = "";

      qData.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerText = choice;
        btn.onclick = () => selectAnswer(btn, choice);
        choicesBox.appendChild(btn);
      });
    }

    // ==========================
    // SELECT ANSWER
    // ==========================
    function selectAnswer(button, selectedChoice) {
      if (answered) return;
      answered = true;

      const qData = selectedQuestions[currentIndex];
      const allBtns = document.querySelectorAll(".choice-btn");

      allBtns.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === qData.answer) {
          btn.classList.add("correct");
        }
      });

      const feedbackBox = document.getElementById("feedbackBox");
      feedbackBox.classList.remove("hidden");

      if (selectedChoice === qData.answer) {
        score += 20;
        button.classList.add("correct");
        feedbackBox.innerHTML = `
          <b>✅ Benar!</b><br>
          ${qData.explanation}
        `;
      } else {
        button.classList.add("wrong");
        feedbackBox.innerHTML = `
          <b>❌ Salah!</b><br>
          Jawaban benar: <b>${qData.answer}</b><br><br>
          ${qData.explanation}
        `;
      }

      document.getElementById("scoreNow").innerText = score;
      document.getElementById("nextBtn").style.display = "block";
    }

    // ==========================
    // NEXT QUESTION
    // ==========================
    function nextQuestion() {
      currentIndex++;

      if (currentIndex < selectedQuestions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    // ==========================
    // SHOW RESULT
    // ==========================
    function showResult() {
      stopTimer();

      const timeTaken = Math.floor((Date.now() - startTime) / 1000);

      document.getElementById("quizScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      document.getElementById("finalScore").innerText = score + "/100";
      document.getElementById("finalUser").innerText = username;
      document.getElementById("finalTime").innerText = timeTaken;

      let msg = "";
      if (score === 100) msg = "🔥 Perfect! Kamu jago sejarah!";
      else if (score >= 80) msg = "✨ Keren! Hampir sempurna!";
      else if (score >= 60) msg = "👍 Lumayan! Tinggal sedikit lagi!";
      else msg = "😅 Coba lagi ya! Kamu pasti bisa!";

      document.getElementById("finalMessage").innerText = msg;

      updateLeaderboard(username, score, timeTaken);
    }

    // ==========================
    // RESTART QUIZ
    // ==========================
    function restartQuiz() {
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("startScreen").classList.remove("hidden");

      document.getElementById("usernameInput").value = "";
      renderLeaderboard();
    }

    // ==========================
    // SHUFFLE
    // ==========================
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // ==========================
    // AUTO LOAD
    // ==========================
    renderLeaderboard();
  </script>
</body>
</html>
